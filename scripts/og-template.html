<!DOCTYPE html>
<html lang="en">
<!-- Template rendered by headless Edge/Chrome at 1200x630 to produce
     assets/og-image.png. See scripts/generate-images note in README. -->
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: "Space Grotesk";
    font-weight: 300;
    src: url("../assets/fonts/SpaceGrotesk-300.woff2") format("woff2");
  }
  @font-face {
    font-family: "Space Grotesk";
    font-weight: 500;
    src: url("../assets/fonts/SpaceGrotesk-500.woff2") format("woff2");
  }
  @font-face {
    font-family: "Space Grotesk";
    font-weight: 700;
    src: url("../assets/fonts/SpaceGrotesk-700.woff2") format("woff2");
  }
  @font-face {
    font-family: "IBM Plex Mono";
    font-weight: 500;
    src: url("../assets/fonts/IBMPlexMono-500.woff2") format("woff2");
  }
  html, body { margin: 0; padding: 0; background: #1A1410; }
  body {
    width: 1200px; height: 630px;
    font-family: "Space Grotesk", sans-serif;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 96px;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
  }
  .lockup { display: flex; align-items: center; gap: 18px; margin-bottom: 48px; }
  .lockup svg { width: 44px; height: 44px; color: #D9825A; }
  .wordmark {
    font-weight: 500;
    font-size: 34px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #D9A441;
  }
  .rule { width: 64px; border: 0; border-top: 3px solid #D9825A; margin: 0 0 40px; }
  .title {
    font-weight: 700;
    font-size: 84px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: #F4EDE2;
    margin: 0 0 28px;
  }
  .subtitle {
    font-weight: 300;
    font-size: 32px;
    color: #C4B299;
    margin: 0 0 56px;
  }
  .meta {
    font-family: "IBM Plex Mono", monospace;
    font-weight: 500;
    font-size: 19px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #8A7355;
  }
</style>
</head>
<body>
  <div class="lockup">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 12a1 1 0 0 1-10 0 1 1 0 0 0-10 0"/>
      <path d="M7 20.7a1 1 0 1 1 5-8.7 1 1 0 1 0 5-8.6"/>
      <path d="M7 3.3a1 1 0 1 1 5 8.6 1 1 0 1 0 5 8.6"/>
      <circle cx="12" cy="12" r="10"/>
    </svg>
    <div class="wordmark">Kognaro</div>
  </div>
  <hr class="rule">
  <div class="title">Trust Is Structural</div>
  <div class="subtitle">Semantic AI as the Fabric of the Business</div>
  <div class="meta">A Framework White Paper · July 2026</div>
</body>
</html>
